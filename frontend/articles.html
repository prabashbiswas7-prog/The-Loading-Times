<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>All Articles — The Loading Times</title>
  <meta name="description" content="Browse all articles on The Loading Times.">
  <link rel="icon" href="/assets/img/logo.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Lora:ital,wght@0,400;1,400&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<header class="site-header" id="site-header"></header>

<div class="container">
  <div class="page-hero">
    <h1>All Articles</h1>
    <p>Every story we've taken our time writing.</p>
  </div>

  <!-- Filter bar -->
  <div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:24px;align-items:center;">
    <select id="cat-filter" style="padding:9px 14px;background:var(--bg2);border:1px solid var(--border);color:var(--text);border-radius:6px;font-family:var(--font-ui);font-size:13px;cursor:pointer;">
      <option value="">All Categories</option>
    </select>
    <select id="sort-filter" style="padding:9px 14px;background:var(--bg2);border:1px solid var(--border);color:var(--text);border-radius:6px;font-family:var(--font-ui);font-size:13px;cursor:pointer;">
      <option value="newest">Newest First</option>
      <option value="oldest">Oldest First</option>
      <option value="popular">Most Popular</option>
    </select>
  </div>

  <div class="cards-grid" id="articles-grid"><div class="spinner"></div></div>
  <div class="pagination hidden" id="pagination">
    <button id="prev-btn" disabled>← Newer</button>
    <button id="next-btn">Older →</button>
  </div>
</div>

<footer class="site-footer" id="site-footer"></footer>

<script src="/js/core.js"></script>
<script>
const PAGE_SIZE = 20;
let allPosts = [], filtered = [];
let page = 1;

async function init() {
  try {
    const [posts, cats] = await Promise.all([api('/api/posts'), cachedApi('/api/categories')]);
    allPosts = sortByDate(posts);
    await attachCatNames(allPosts);

    // Populate category filter
    const sel = document.getElementById('cat-filter');
    cats.filter(c => !c.parentId).forEach(c => {
      const opt = document.createElement('option');
      opt.value = c.id; opt.textContent = c.name;
      sel.appendChild(opt);
    });

    sel.addEventListener('change', applyFilters);
    document.getElementById('sort-filter').addEventListener('change', applyFilters);
    applyFilters();
  } catch (e) {
    document.getElementById('articles-grid').innerHTML = `<div class="empty-state">Error loading articles.</div>`;
  }
}

function applyFilters() {
  const catId = document.getElementById('cat-filter').value;
  const sort = document.getElementById('sort-filter').value;

  filtered = catId ? allPosts.filter(p => p.categoryId === catId) : [...allPosts];

  if (sort === 'oldest') filtered.reverse();
  else if (sort === 'popular') filtered.sort((a,b) => (b.views||0)-(a.views||0));

  page = 1;
  render();
}

function render() {
  const grid = document.getElementById('articles-grid');
  const pag = document.getElementById('pagination');
  const start = (page - 1) * PAGE_SIZE;
  const slice = filtered.slice(start, start + PAGE_SIZE);
  grid.innerHTML = slice.length ? slice.map(p => cardHtml(p, p._catName)).join('') : `<div class="empty-state">No articles found.</div>`;

  if (filtered.length > PAGE_SIZE) {
    pag.classList.remove('hidden');
    document.getElementById('prev-btn').disabled = page === 1;
    document.getElementById('next-btn').disabled = start + PAGE_SIZE >= filtered.length;
  } else {
    pag.classList.add('hidden');
  }
}

document.getElementById('next-btn').addEventListener('click', () => { page++; render(); scrollTo({top:0,behavior:'smooth'}); });
document.getElementById('prev-btn').addEventListener('click', () => { page--; render(); scrollTo({top:0,behavior:'smooth'}); });

init();
</script>
</body>
</html>
